<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace · Usage</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="ws-usage">
  <div class="app">
    <header class="header">
      <div class="brand"><img src="../assets/logo.svg" alt="logo" /><h1>Workspace · 使用统计</h1></div>
      <div class="toolbar"><a class="btn" href="../index.html">返回入口</a><a class="btn" data-page-link="ws-usage" href="./usage.html">当前页</a><a class="btn" href="../admin/analytics.html">查看运维分析</a></div>
    </header>
    <main class="main">
      <section class="panel">
        <h3 class="section-title">使用与计费概览</h3>
        <div class="metric-list">
          <div class="metric"><div class="name">本月 Token</div><div class="value">4.82B</div></div>
          <div class="metric"><div class="name">累计调用</div><div class="value">23.4M</div></div>
          <div class="metric"><div class="name">预估成本</div><div class="value">$39,821</div></div>
          <div class="metric"><div class="name">预算使用率</div><div class="value">72%</div></div>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/main.js"></script>

</html>
